<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Map & Archive — Cinematic Counter-Cartographies</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.18.0/mapbox-gl.css" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; }
    #map { position: absolute; top: 56px; bottom: 0; width: 100%; z-index: 1000; }
    .search-bar-container {
      position: absolute;
      top: 72px; /* Lowered below the navbar */
      left: 32px; /* Move to left side */
      transform: none;
      z-index: 1001;
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(40,131,102,0.13);
      padding: 0.5em 1em;
      display: flex;
      align-items: center;
      gap: 0.5em;
      width: 320px;
      max-width: 90vw;
    }
    .search-bar-container input[type="text"] {
      flex: 1;
      border: none;
      border-radius: 8px;
      padding: 0.5em;
      font-size: 1rem;
      outline: none;
      background: #f7f6f2;
      color: #222;
    }
    .search-bar-container button {
      background: #288366;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.5em 1em;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
    }
    .search-bar-container button:hover {
      background: #e6a93a;
      color: #222;
    }
    #map-legend {
      position: absolute;
      bottom: 32px;
      left: 32px;
      background: rgba(255,255,255,0.65); /* More transparent */
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(40,131,102,0.13);
      padding: 1.1em 1.4em 1.1em 1.2em;
      font-size: 1.05rem;
      color: #222;
      z-index: 1002;
      min-width: 180px;
    }
    #map-legend div {
      display: flex;
      align-items: center;
      margin-bottom: 0.4em;
    }
    #map-legend span {
      display: inline-block;
      margin-right: 0.7em;
    }
    #map-legend .legend-color {
      width: 18px;
      height: 18px;
      border-radius: 50%;
    }
    #map-legend .checkpoint {
      background: #e6a93a;
      border: 2px solid #b94e3a;
    }
    #map-legend .search-result {
      background: #288366;
      border: 2px solid #fff;
    }
    #map-legend .buildings {
      width: 18px;
      height: 18px;
      background: linear-gradient(120deg,#e6a93a22 0%,#6fe7c1 100%);
      border-radius: 4px;
      border: 1.5px solid #288366;
    }
  </style>
</head>
<body>
  <nav class="topnav">
    <div class="brand">Cinematic Counter‑Cartographies</div>
    <div class="menu">
      <a href="index.html">Home</a>
      <a href="map.html" class="active">Map & Archive</a>
      <a href="checkpoints.html">Checkpoints</a>
      <a href="analysis.html">Visual Analysis</a>
      <a href="not-mapped.html">What's Not Mapped</a>
    </div>
  </nav>

  <div class="search-bar-container">
    <input type="text" id="searchInput" placeholder="Search for a place or location..." autocomplete="off" />
    <button id="searchBtn">Search</button>
    <ul id="searchResults" style="position:absolute;top:2.7em;left:0;width:100%;background:#fff;border-radius:0;box-shadow:none;list-style:none;margin:0;padding:0;z-index:1002;max-height:220px;overflow-y:auto;display:none;"></ul>
  </div>

  <div id="map" role="region" aria-label="Interactive map of Palestinian checkpoints"></div>

  <div id="map-legend">
    <div style="font-weight: bold; margin-bottom: 0.5em;">Legend</div>
    <div style="display: flex; align-items: center; margin-bottom: 0.4em;">
      <span class="legend-color checkpoint"></span>
      <span>Checkpoint</span>
    </div>
    <div style="display: flex; align-items: center; margin-bottom: 0.4em;">
      <span class="legend-color search-result"></span>
      <span>Search Result</span>
    </div>
    <div style="display: flex; align-items: center;">
      <span class="buildings"></span>
      <span>3D Buildings (zoom in)</span>
    </div>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.18.0/mapbox-gl.js"></script>
  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiYXdpc21hMDEiLCJhIjoiY21sYjZudTJkMGs5ZTNkcTY2ZXRnbmt0NiJ9.3XcsI4p3lFOou3ulXWFXXQ';

    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/standard-satellite',
      center: [35.25, 31.95], // Centered to show all of West Bank
      zoom: 9.2,              // Zoomed out to fit the outline
      pitch: 45,
      bearing: -17.6,
      antialias: true
    });

    map.on('load', () => {
      // --- Curved West Bank boundary GeoJSON (simplified for demo) ---
      const westBankBoundary = {
        "type": "Feature",
        "geometry": {
          "type": "Polygon",
          "coordinates": [[
            [35.5469, 32.5022], [35.4895, 32.4646], [35.4376, 32.4207], [35.3936, 32.3821],
            [35.3537, 32.3448], [35.3122, 32.3087], [35.2731, 32.2734], [35.2347, 32.2382],
            [35.1963, 32.2030], [35.1580, 32.1678], [35.1196, 32.1326], [35.0812, 32.0974],
            [35.0428, 32.0622], [35.0044, 32.0270], [34.9660, 31.9918], [34.9276, 31.9566],
            [34.9226, 31.9000], [34.9500, 31.8000], [35.0000, 31.7000], [35.1000, 31.6000],
            [35.2000, 31.5500], [35.3000, 31.5300], [35.4000, 31.5400], [35.5000, 31.6000],
            [35.5500, 31.7000], [35.5700, 31.8000], [35.5739, 31.9000], [35.5739, 32.0000],
            [35.5739, 32.1000], [35.5739, 32.2000], [35.5739, 32.3000], [35.5739, 32.4000],
            [35.5739, 32.5022], [35.5469, 32.5022]
          ]]
        }
      };

      // Add the West Bank boundary as a source
      map.addSource('westbank-boundary', {
        type: 'geojson',
        data: westBankBoundary
      });

      // Add a glow (wide, semi-transparent) under the main outline
      map.addLayer({
        id: 'westbank-outline-glow',
        type: 'line',
        source: 'westbank-boundary',
        layout: {},
        paint: {
          'line-color': '#fff',
          'line-width': 10,
          'line-opacity': 0.5,
          'line-blur': 2
        }
      });

      // Add a sharp, bold main outline
      map.addLayer({
        id: 'westbank-outline',
        type: 'line',
        source: 'westbank-boundary',
        layout: {},
        paint: {
          'line-color': '#ff0033',
          'line-width': 4,
          'line-opacity': 1
        }
      });

      const layers = map.getStyle().layers;
      const labelLayerId = layers.find(
        (layer) => layer.type === 'symbol' && layer.layout['text-field']
      ).id;

      map.addLayer(
        {
          id: 'add-3d-buildings',
          source: 'composite',
          'source-layer': 'building',
          filter: ['==', 'extrude', 'true'],
          type: 'fill-extrusion',
          minzoom: 15,
          paint: {
            'fill-extrusion-color': '#aaa',
            'fill-extrusion-height': [
              'interpolate',
              ['linear'],
              ['zoom'],
              15, 0,
              15.05, ['get', 'height']
            ],
            'fill-extrusion-base': [
              'interpolate',
              ['linear'],
              ['zoom'],
              15, 0,
              15.05, ['get', 'min_height']
            ],
            'fill-extrusion-opacity': 0.6
          }
        },
        labelLayerId
      );

      // --- Add checkpoint markers ---
      const markerPopups = [];
      checkpointGeoJSON.features.forEach(feature => {
        const { title, arabic, description } = feature.properties;

        // Use an orange circle for the icon
        const el = document.createElement('div');
        el.style.width = '38px';
        el.style.height = '38px';
        el.style.backgroundColor = '#e6a93a';
        el.style.border = '2px solid #b94e3a';
        el.style.borderRadius = '50%';
        el.style.boxShadow = '0 2px 8px #0002';
        el.style.cursor = 'pointer';

        const marker = new mapboxgl.Marker({ element: el })
          .setLngLat(feature.geometry.coordinates)
          .addTo(map);

        const popup = new mapboxgl.Popup({ offset: 18 })
          .setLngLat(feature.geometry.coordinates)
          .setHTML(
            `<strong>${title}</strong><br><span style="font-size:1.1em;color:#288366;">${arabic}</span><br>${description}`
          );

        markerPopups.push({ marker, popup, el });

        let isOpen = false;
        el.addEventListener('click', function(e) {
          e.stopPropagation();
          if (isOpen) {
            popup.remove();
            isOpen = false;
          } else {
            markerPopups.forEach(mp => mp.popup.remove());
            popup.addTo(map);
            isOpen = true;
          }
        });
      });

      // Close all popups when clicking elsewhere on the map
      map.on('click', function() {
        markerPopups.forEach(mp => mp.popup.remove());
        if (window.searchMarker && window.searchMarker.getPopup()) {
          window.searchMarker.getPopup().remove();
        }
      });
    });

    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const searchResults = document.getElementById('searchResults');

    let lastResults = [];

    // Helper to extract Arabic name from feature or context
    function getArabicName(feature) {
      // Try direct property
      if (feature.text_ar) return feature.text_ar;
      // Try context array
      if (feature.context) {
        for (const c of feature.context) {
          if (c.language === "ar" && c.text_ar) return c.text_ar;
        }
      }
      return "";
    }

    // Helper: search checkpoints with Arabic fallback
    function searchCheckpoints(query) {
      const lowerQuery = query.toLowerCase().trim();
      return checkpointGeoJSON.features.filter(feature => {
        const { title, arabic } = feature.properties;
        return (
          title.toLowerCase().includes(lowerQuery) ||
          arabic.toLowerCase().includes(lowerQuery)
        );
      });
    }

    // Function to search global places using Mapbox Geocoding API
    function searchGlobalPlaces(query, callback) {
      fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json?access_token=${mapboxgl.accessToken}&language=en,ar`)
        .then(response => response.json())
        .then(data => {
          callback(data.features);
        });
    }

    // --- Unified function to show search results ---
    function showSearchResults(results, isCheckpoint) {
      searchResults.innerHTML = "";
      if (results.length === 0) {
        searchResults.style.display = "none";
        return;
      }

      results.forEach(result => {
        const li = document.createElement('li');
        li.style.padding = "0.5em 1em";
        li.style.cursor = "pointer";
        li.style.borderBottom = "1px solid #eee";
        if (isCheckpoint) {
          li.textContent = `${result.properties.title} (${result.properties.arabic})`;
        } else {
          li.textContent = result.place_name;
        }
        li.addEventListener('click', () => {
          let coordinates;
          let popupHTML;
          if (isCheckpoint) {
            coordinates = result.geometry.coordinates;
            popupHTML = `<strong>${result.properties.title}</strong><br><span style="font-size:1.1em;color:#288366;">${result.properties.arabic}</span><br>${result.properties.description}`;
          } else {
            coordinates = result.geometry.coordinates;
            popupHTML = `<strong>${result.text}</strong><br>${result.place_name}`;
          }

          map.flyTo({ center: coordinates, zoom: 15, essential: true });

          // Remove any existing search marker
          if (window.searchMarker) {
            window.searchMarker.remove();
            window.searchMarker = null;
          }

          // Create marker for the search result
          const searchEl = document.createElement('div');
          searchEl.style.width = '38px';
          searchEl.style.height = '38px';
          searchEl.style.backgroundColor = isCheckpoint ? '#e6a93a' : '#288366';
          searchEl.style.border = '2px solid #b94e3a';
          searchEl.style.borderRadius = '50%';
          searchEl.style.boxShadow = '0 2px 8px #0002';
          searchEl.style.cursor = 'pointer';

          const searchPopup = new mapboxgl.Popup({ offset: 18 })
            .setLngLat(coordinates)
            .setHTML(popupHTML);

          window.searchMarker = new mapboxgl.Marker({ element: searchEl })
            .setLngLat(coordinates)
            .setPopup(searchPopup)
            .addTo(map);

          markerPopups.forEach(mp => mp.popup.remove());

          searchResults.style.display = "none";
        });
        searchResults.appendChild(li);
      });

      searchResults.style.display = "block";
    }

    // --- Combined function to show checkpoint and global search results ---
    function showCombinedSearchResults(checkpointResults, globalResults) {
      searchResults.innerHTML = "";
      if (checkpointResults.length === 0 && globalResults.length === 0) {
        searchResults.style.display = "none";
        return;
      }

      // Show checkpoint results first
      checkpointResults.forEach(result => {
        const li = document.createElement('li');
        li.style.padding = "0.5em 1em";
        li.style.cursor = "pointer";
        li.style.borderBottom = "1px solid #eee";
        li.textContent = `${result.properties.title} (${result.properties.arabic})`;
        li.style.background = "#fffbe6";
        li.addEventListener('click', () => {
          const coordinates = result.geometry.coordinates;
          const popupHTML = `<strong>${result.properties.title}</strong><br><span style="font-size:1.1em;color:#288366;">${result.properties.arabic}</span><br>${result.properties.description}`;

          map.flyTo({ center: coordinates, zoom: 15, essential: true });

          if (window.searchMarker) {
            window.searchMarker.remove();
            window.searchMarker = null;
          }

          const searchEl = document.createElement('div');
          searchEl.style.width = '38px';
          searchEl.style.height = '38px';
          searchEl.style.backgroundColor = '#e6a93a';
          searchEl.style.border = '2px solid #b94e3a';
          searchEl.style.borderRadius = '50%';
          searchEl.style.boxShadow = '0 2px 8px #0002';
          searchEl.style.cursor = 'pointer';

          const searchPopup = new mapboxgl.Popup({ offset: 18 })
            .setLngLat(coordinates)
            .setHTML(popupHTML);

          window.searchMarker = new mapboxgl.Marker({ element: searchEl })
            .setLngLat(coordinates)
            .setPopup(searchPopup)
            .addTo(map);

          markerPopups.forEach(mp => mp.popup.remove());

          searchResults.style.display = "none";
        });
        searchResults.appendChild(li);
      });

      // Divider if both types exist
      if (checkpointResults.length > 0 && globalResults.length > 0) {
        const divider = document.createElement('li');
        divider.style.padding = "0.3em 1em";
        divider.style.fontSize = "0.95em";
        divider.style.color = "#888";
        divider.style.background = "#f7f6f2";
        divider.textContent = "Other places";
        divider.style.borderBottom = "1px solid #eee";
        searchResults.appendChild(divider);
      }

      // Show global place results
      globalResults.forEach(result => {
        const li = document.createElement('li');
        li.style.padding = "0.5em 1em";
        li.style.cursor = "pointer";
        li.style.borderBottom = "1px solid #eee";
        li.textContent = result.place_name;
        li.style.background = "#f7f6f2";
        li.addEventListener('click', () => {
          const coordinates = result.geometry.coordinates;
          const popupHTML = `<strong>${result.text}</strong><br>${result.place_name}`;

          map.flyTo({ center: coordinates, zoom: 15, essential: true });

          if (window.searchMarker) {
            window.searchMarker.remove();
            window.searchMarker = null;
          }

          const searchEl = document.createElement('div');
          searchEl.style.width = '38px';
          searchEl.style.height = '38px';
          searchEl.style.backgroundColor = '#288366';
          searchEl.style.border = '2px solid #fff';
          searchEl.style.borderRadius = '50%';
          searchEl.style.boxShadow = '0 2px 8px #0002';
          searchEl.style.cursor = 'pointer';

          const searchPopup = new mapboxgl.Popup({ offset: 18 })
            .setLngLat(coordinates)
            .setHTML(popupHTML);

          window.searchMarker = new mapboxgl.Marker({ element: searchEl })
            .setLngLat(coordinates)
            .setPopup(searchPopup)
            .addTo(map);

          markerPopups.forEach(mp => mp.popup.remove());

          searchResults.style.display = "none";
        });
        searchResults.appendChild(li);
      });

      searchResults.style.display = "block";
    }

    // Event: search button click
    searchBtn.addEventListener('click', () => {
      const query = searchInput.value;
      if (!query) return;

      // Search checkpoints first
      const checkpointResults = searchCheckpoints(query);

      // Always search globally as well
      searchGlobalPlaces(query, globalResults => {
        showCombinedSearchResults(checkpointResults, globalResults);
      });
    });

    // Event: search input keyup (for instant search)
    searchInput.addEventListener('keyup', () => {
      const query = searchInput.value;
      if (!query) {
        searchResults.style.display = "none";
        return;
      }

      const checkpointResults = searchCheckpoints(query);

      searchGlobalPlaces(query, globalResults => {
        showCombinedSearchResults(checkpointResults, globalResults);
      });
    });

    // Close search results when clicking outside
    map.on('click', () => {
      searchResults.style.display = "none";
    });
  </script>

  </script>
