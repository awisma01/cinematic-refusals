<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Map & Archive — Cinematic Counter-Cartographies</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.18.0/mapbox-gl.css" rel="stylesheet">
  <style>
    body { margin: 0; padding: 0; }
    #map { position: absolute; top: 56px; bottom: 0; width: 100%; }
    .search-bar-container {
      position: absolute;
      top: 72px; /* Lowered below the navbar */
      left: 32px; /* Move to left side */
      transform: none;
      z-index: 1001;
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(40,131,102,0.13);
      padding: 0.5em 1em;
      display: flex;
      align-items: center;
      gap: 0.5em;
      width: 320px;
      max-width: 90vw;
    }
    .search-bar-container input[type="text"] {
      flex: 1;
      border: none;
      border-radius: 8px;
      padding: 0.5em;
      font-size: 1rem;
      outline: none;
      background: #f7f6f2;
      color: #222;
    }
    .search-bar-container button {
      background: #288366;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.5em 1em;
      font-size: 1rem;
      cursor: pointer;
      font-weight: bold;
    }
    .search-bar-container button:hover {
      background: #e6a93a;
      color: #222;
    }
    #map-legend {
      position: absolute;
      bottom: 32px;
      left: 32px;
      background: rgba(255,255,255,0.65); /* More transparent */
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(40,131,102,0.13);
      padding: 1.1em 1.4em 1.1em 1.2em;
      font-size: 1.05rem;
      color: #222;
      z-index: 1002;
      min-width: 180px;
    }
    #map-legend div {
      display: flex;
      align-items: center;
      margin-bottom: 0.4em;
    }
    #map-legend span {
      display: inline-block;
      margin-right: 0.7em;
    }
    #map-legend .legend-color {
      width: 18px;
      height: 18px;
      border-radius: 50%;
    }
    #map-legend .checkpoint {
      background: #e6a93a;
      border: 2px solid #b94e3a;
    }
    #map-legend .search-result {
      background: #288366;
      border: 2px solid #fff;
    }
    #map-legend .buildings {
      width: 18px;
      height: 18px;
      background: linear-gradient(120deg,#e6a93a22 0%,#6fe7c1 100%);
      border-radius: 4px;
      border: 1.5px solid #288366;
    }
  </style>
</head>
<body>
  <nav class="topnav">
    <div class="brand">Cinematic Counter‑Cartographies</div>
    <div class="menu">
      <a href="index.html">Home</a>
      <a href="map.html" class="active">Map & Archive</a>
      <a href="checkpoints.html">Checkpoints</a>
      <a href="analysis.html">Visual Analysis</a>
      <a href="not-mapped.html">What's Not Mapped</a>
    </div>
  </nav>

  <div class="search-bar-container">
    <input type="text" id="searchInput" placeholder="Search for a place or location..." autocomplete="off" />
    <button id="searchBtn">Search</button>
    <ul id="searchResults" style="position:absolute;top:2.7em;left:0;width:100%;background:#fff;border-radius:0 0 10px 10px;box-shadow:0 2px 8px #0002;list-style:none;margin:0;padding:0;z-index:1002;max-height:220px;overflow-y:auto;display:none;"></ul>
  </div>

  <div id="map" role="region" aria-label="Interactive map of Palestinian checkpoints"></div>

  <div id="map-legend">
    <div style="font-weight: bold; margin-bottom: 0.5em;">Legend</div>
    <div style="display: flex; align-items: center; margin-bottom: 0.4em;">
      <span class="legend-color checkpoint"></span>
      <span>Checkpoint</span>
    </div>
    <div style="display: flex; align-items: center; margin-bottom: 0.4em;">
      <span class="legend-color search-result"></span>
      <span>Search Result</span>
    </div>
    <div style="display: flex; align-items: center;">
      <span class="buildings"></span>
      <span>3D Buildings (zoom in)</span>
    </div>
  </div>

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.18.0/mapbox-gl.js"></script>
  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiYXdpc21hMDEiLCJhIjoiY21sYjZudTJkMGs5ZTNkcTY2ZXRnbmt0NiJ9.3XcsI4p3lFOou3ulXWFXXQ';

    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/standard-satellite',
      center: [35.25, 31.95], // Centered to show all of West Bank
      zoom: 9.2,              // Zoomed out to fit the outline
      pitch: 45,
      bearing: -17.6,
      antialias: true
    });

    map.on('load', () => {
      // --- Curved West Bank boundary GeoJSON (simplified for demo) ---
      const westBankBoundary = {
        "type": "Feature",
        "geometry": {
          "type": "Polygon",
          "coordinates": [[
            [35.5469, 32.5022], [35.4895, 32.4646], [35.4376, 32.4207], [35.3936, 32.3821],
            [35.3537, 32.3448], [35.3122, 32.3087], [35.2731, 32.2734], [35.2347, 32.2382],
            [35.1963, 32.2030], [35.1580, 32.1678], [35.1196, 32.1326], [35.0812, 32.0974],
            [35.0428, 32.0622], [35.0044, 32.0270], [34.9660, 31.9918], [34.9276, 31.9566],
            [34.9226, 31.9000], [34.9500, 31.8000], [35.0000, 31.7000], [35.1000, 31.6000],
            [35.2000, 31.5500], [35.3000, 31.5300], [35.4000, 31.5400], [35.5000, 31.6000],
            [35.5500, 31.7000], [35.5700, 31.8000], [35.5739, 31.9000], [35.5739, 32.0000],
            [35.5739, 32.1000], [35.5739, 32.2000], [35.5739, 32.3000], [35.5739, 32.4000],
            [35.5739, 32.5022], [35.5469, 32.5022]
          ]]
        }
      };

      // Add the West Bank boundary as a source
      map.addSource('westbank-boundary', {
        type: 'geojson',
        data: westBankBoundary
      });

      // Add a glow (wide, semi-transparent) under the main outline
      map.addLayer({
        id: 'westbank-outline-glow',
        type: 'line',
        source: 'westbank-boundary',
        layout: {},
        paint: {
          'line-color': '#fff',
          'line-width': 10,
          'line-opacity': 0.5,
          'line-blur': 2
        }
      });

      // Add a sharp, bold main outline
      map.addLayer({
        id: 'westbank-outline',
        type: 'line',
        source: 'westbank-boundary',
        layout: {},
        paint: {
          'line-color': '#ff0033',
          'line-width': 4,
          'line-opacity': 1
        }
      });

      const layers = map.getStyle().layers;
      const labelLayerId = layers.find(
        (layer) => layer.type === 'symbol' && layer.layout['text-field']
      ).id;

      map.addLayer(
        {
          id: 'add-3d-buildings',
          source: 'composite',
          'source-layer': 'building',
          filter: ['==', 'extrude', 'true'],
          type: 'fill-extrusion',
          minzoom: 15,
          paint: {
            'fill-extrusion-color': '#aaa',
            'fill-extrusion-height': [
              'interpolate',
              ['linear'],
              ['zoom'],
              15, 0,
              15.05, ['get', 'height']
            ],
            'fill-extrusion-base': [
              'interpolate',
              ['linear'],
              ['zoom'],
              15, 0,
              15.05, ['get', 'min_height']
            ],
            'fill-extrusion-opacity': 0.6
          }
        },
        labelLayerId
      );

      // --- Add checkpoint markers ---
      checkpointGeoJSON.features.forEach(feature => {
        const { title, arabic, description } = feature.properties;

        // Create a custom icon element
        const el = document.createElement('div');
        el.style.backgroundImage = "url('https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f6a7.png')"; // construction barrier emoji as example
        el.style.width = '34px';
        el.style.height = '34px';
        el.style.backgroundSize = 'contain';
        el.style.backgroundRepeat = 'no-repeat';
        el.style.borderRadius = '50%';
        el.style.boxShadow = '0 2px 8px #0002';

        new mapboxgl.Marker({ element: el })
          .setLngLat(feature.geometry.coordinates)
          .setPopup(
            new mapboxgl.Popup({ offset: 18 })
              .setHTML(
                `<strong>${title}</strong><br><span style="font-size:1.1em;color:#288366;">${arabic}</span><br>${description}`
              )
          )
          .addTo(map);
      });

      // Add custom icon markers for each checkpoint
      checkpointGeoJSON.features.forEach(feature => {
        const { title, arabic, description } = feature.properties;

        // Create a custom icon element
        const el = document.createElement('div');
        el.style.backgroundImage = "url('https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f6a7.png')";
        el.style.width = '34px';
        el.style.height = '34px';
        el.style.backgroundSize = 'contain';
        el.style.backgroundRepeat = 'no-repeat';
        el.style.borderRadius = '50%';
        el.style.boxShadow = '0 2px 8px #0002';
        el.style.border = '2px solid #e6a93a';
        el.style.backgroundColor = '#fff';

        new mapboxgl.Marker({ element: el })
          .setLngLat(feature.geometry.coordinates)
          .setPopup(
            new mapboxgl.Popup({ offset: 18 })
              .setHTML(
                `<strong>${title}</strong><br><span style="font-size:1.1em;color:#288366;">${arabic}</span><br>${description}`
              )
          )
          .addTo(map);
      });
    });

    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const searchResults = document.getElementById('searchResults');

    let lastResults = [];

    // Helper to extract Arabic name from feature or context
    function getArabicName(feature) {
      // Try direct property
      if (feature.text_ar) return feature.text_ar;
      // Try context array
      if (feature.context) {
        for (const c of feature.context) {
          if (c.language === "ar" && c.text_ar) return c.text_ar;
        }
      }
      return "";
    }

    // Helper: search checkpoints by name or arabic
    function searchCheckpoints(query) {
      const q = query.trim().toLowerCase();
      return checkpointGeoJSON.features.filter(f =>
        f.properties.title.toLowerCase().includes(q) ||
        (f.properties.arabic && f.properties.arabic.toLowerCase().includes(q))
      ).map(f => ({
        type: 'checkpoint',
        feature: f
      }));
    }

    // --- Modify showResults to handle both geocoder and checkpoint results ---
    function showResults(features) {
      searchResults.innerHTML = '';
      if (features.length === 0) {
        searchResults.style.display = 'none';
        return;
      }
      features.forEach((f, idx) => {
        const li = document.createElement('li');
        if (f.type === 'checkpoint') {
          // Checkpoint result
          li.textContent = `${f.feature.properties.title} (${f.feature.properties.arabic})`;
          li.style.color = '#e6a93a';
          li.onclick = () => {
            searchResults.style.display = 'none';
            searchInput.value = f.feature.properties.title;
            map.flyTo({ center: f.feature.geometry.coordinates, zoom: 14 });
            new mapboxgl.Popup()
              .setLngLat(f.feature.geometry.coordinates)
              .setHTML(
                `<strong>${f.feature.properties.title}</strong><br><span style="font-size:1.1em;color:#288366;">${f.feature.properties.arabic}</span><br>${f.feature.properties.description}`
              )
              .addTo(map);
          };
        } else {
          // Geocoder result
          li.textContent = f.place_name;
          li.onclick = () => {
            searchResults.style.display = 'none';
            searchInput.value = f.place_name;
            map.flyTo({ center: f.center, zoom: 13 });
            const english = f.text || "";
            const arabic = getArabicName(f);
            let popupContent = `<strong>${english}</strong>`;
            if (arabic && arabic !== english) {
              popupContent += `<br><span style="font-size:1.1em;color:#288366;">${arabic}</span>`;
            }
            popupContent += `<br>${f.place_name}`;
            new mapboxgl.Marker({ color: "#e6a93a" })
              .setLngLat(f.center)
              .setPopup(new mapboxgl.Popup().setHTML(popupContent))
              .addTo(map)
              .togglePopup();
          };
        }
        li.style.padding = '0.5em 0.7em';
        li.style.cursor = 'pointer';
        li.onmouseenter = () => li.style.background = '#e6a93a22';
        li.onmouseleave = () => li.style.background = '';
        searchResults.appendChild(li);
      });
      searchResults.style.display = 'block';
    }

    searchInput.addEventListener('input', function() {
      const query = searchInput.value.trim();
      if (!query) {
        searchResults.style.display = 'none';
        return;
      }
      // Search both geocoder and checkpoints
      fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(query)}.json?access_token=${mapboxgl.accessToken}`)
        .then(res => res.json())
        .then(data => {
          // Combine checkpoint results and geocoder results
          const checkpointResults = searchCheckpoints(query);
          lastResults = [...checkpointResults, ...(data.features || [])];
          showResults(lastResults);
        });
    });

    searchInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && lastResults.length > 0) {
        const f = lastResults[0];
        if (f.type === 'checkpoint') {
          map.flyTo({ center: f.feature.geometry.coordinates, zoom: 14 });
          new mapboxgl.Popup()
            .setLngLat(f.feature.geometry.coordinates)
            .setHTML(
              `<strong>${f.feature.properties.title}</strong><br><span style="font-size:1.1em;color:#288366;">${f.feature.properties.arabic}</span><br>${f.feature.properties.description}`
            )
            .addTo(map);
        } else {
          map.flyTo({ center: f.center, zoom: 13 });
          new mapboxgl.Marker({ color: "#e6a93a" })
            .setLngLat(f.center)
            .setPopup(new mapboxgl.Popup().setHTML(`<strong>${f.text}</strong><br>${f.place_name}`))
            .addTo(map)
            .togglePopup();
        }
        searchResults.style.display = 'none';
      }
    });

    searchBtn.addEventListener('click', function() {
      if (lastResults.length > 0) {
        const f = lastResults[0];
        if (f.type === 'checkpoint') {
          map.flyTo({ center: f.feature.geometry.coordinates, zoom: 14 });
          new mapboxgl.Popup()
            .setLngLat(f.feature.geometry.coordinates)
            .setHTML(
              `<strong>${f.feature.properties.title}</strong><br><span style="font-size:1.1em;color:#288366;">${f.feature.properties.arabic}</span><br>${f.feature.properties.description}`
            )
            .addTo(map);
        } else {
          map.flyTo({ center: f.center, zoom: 13 });
          new mapboxgl.Marker({ color: "#e6a93a" })
            .setLngLat(f.center)
            .setPopup(new mapboxgl.Popup().setHTML(`<strong>${f.text}</strong><br>${f.place_name}`))
            .addTo(map)
            .togglePopup();
        }
        searchResults.style.display = 'none';
      }
    });

    // Hide results when clicking outside
    document.addEventListener('click', function(e) {
      if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
        searchResults.style.display = 'none';
      }
    });

    // Example checkpoint data (replace/add more as needed)
    const checkpoints = [
      {
        name: "Qalandiya Checkpoint",
        arabic: "حاجز قلنديا",
        coords: [35.2192, 31.8638],
        description: "Most documented checkpoint in the archive."
      },
      {
        name: "Bethlehem — Rachel Checkpoint",
        arabic: "حاجز راحيل (بيت لحم)",
        coords: [35.2043, 31.7031],
        description: "Featured in Jacir’s Salt of This Sea and other films."
      },
      {
        name: "Huwwara Checkpoint",
        arabic: "حاجز حوارة",
        coords: [35.2622, 32.1322],
        description: "Seen in contemporary footage and some archive material."
      },
      {
        name: "Container Checkpoint (Jerusalem)",
        arabic: "حاجز الكونتينر (القدس)",
        coords: [35.2976, 31.6927],
        description: "Known locally as the Container; appears in archive footage."
      },
      {
        name: "Al-Jalama Checkpoint",
        arabic: "حاجز الجلمة",
        coords: [35.2871, 32.5074],
        description: "Northern checkpoint near Jenin."
      },
      {
        name: "Erez Crossing",
        arabic: "معبر إيرز",
        coords: [34.5341, 31.5597],
        description: "Main crossing between Gaza and Israel."
      },
      {
        name: "Tarqumiya Checkpoint",
        arabic: "حاجز ترقوميا",
        coords: [35.0231, 31.5536],
        description: "West of Hebron, major commercial checkpoint."
      }
      // Add more, always with both name and arabic fields
    ];

    // Convert to GeoJSON
    const checkpointGeoJSON = {
      type: "FeatureCollection",
      features: checkpoints.map(cp => ({
        type: "Feature",
        geometry: { type: "Point", coordinates: cp.coords },
        properties: {
          title: cp.name,
          arabic: cp.arabic,
          description: cp.description
        }
      }))
    };

    map.on('load', () => {
      // Add checkpoints as a source
      map.addSource('checkpoints', {
        type: 'geojson',
        data: checkpointGeoJSON
      });

      // Add a layer to visualize the checkpoints
      map.addLayer({
        id: 'checkpoints-layer',
        type: 'circle',
        source: 'checkpoints',
        paint: {
          'circle-radius': 6,
          'circle-color': '#e6a93a',
          'circle-opacity': 0.8
        }
      });

      // Add click event to display popup with checkpoint info
      map.on('click', 'checkpoints-layer', (e) => {
        const coordinates = e.features[0].geometry.coordinates.slice();
        const { title, arabic, description } = e.features[0].properties;

        // Zoom into the clicked checkpoint
        map.flyTo({ center: coordinates, zoom: 14, essential: true });

        new mapboxgl.Popup()
          .setLngLat(coordinates)
          .setHTML(
            `<strong>${title}</strong><br><span style="font-size:1.1em;color:#288366;">${arabic}</span><br>${description}`
          )
          .addTo(map);
      });

      // Add custom MapWarper raster overlay
      map.addSource('palestine-historical-overlay', {
        type: 'raster',
        tiles: [
          'https://mapwarper.net/maps/tile/40217/{z}/{x}/{y}.png'
        ],
        tileSize: 256,
        attribution: 'Historical map overlay from mapwarper.net'
      });

      map.addLayer({
        id: 'palestine-historical-overlay-layer',
        type: 'raster',
        source: 'palestine-historical-overlay',
        paint: {
          'raster-opacity': 0.45
        }
      }, 'checkpoints-layer'); // Place below checkpoint markers

      // --- Add custom icon markers for each checkpoint ---
      checkpointGeoJSON.features.forEach(feature => {
        const { title, arabic, description } = feature.properties;

        // Create a custom icon element
        const el = document.createElement('div');
        el.style.backgroundImage = "url('https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f6a7.png')";
        el.style.width = '34px';
        el.style.height = '34px';
        el.style.backgroundSize = 'contain';
        el.style.backgroundRepeat = 'no-repeat';
        el.style.borderRadius = '50%';
        el.style.boxShadow = '0 2px 8px #0002';
        el.style.border = '2px solid #e6a93a';
        el.style.backgroundColor = '#fff';

        new mapboxgl.Marker({ element: el })
          .setLngLat(feature.geometry.coordinates)
          .setPopup(
            new mapboxgl.Popup({ offset: 18 })
              .setHTML(
                `<strong>${title}</strong><br><span style="font-size:1.1em;color:#288366;">${arabic}</span><br>${description}`
              )
          )
          .addTo(map);
      });
    });
  </script>
</body>
</html>
